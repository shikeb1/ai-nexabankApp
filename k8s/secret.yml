apiVersion: v1
kind: Secret
metadata:
  name: nexabank-secret
  namespace: nexabank
  labels:
    app: nexabank
type: Opaque
stringData:
  # ⚠️  REPLACE these values before deploying to production
  # Use a secrets manager (Vault, AWS Secrets Manager, etc.) in real environments
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  DATABASE_URL: "postgresql://nexabank_user:CHANGE_ME_STRONG_PASSWORD@bank-db:5432/nexabank"
