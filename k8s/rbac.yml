# ---------- RBAC ----------
# Backend is the only service that needs k8s API access (reads its own config/secrets)
# Frontend, Postgres, Ollama have NO k8s API access at all.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: nexabank
  labels:
    app: nexabank
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["nexabank-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nexabank-secret"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: nexabank
  labels:
    app: nexabank
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: nexabank
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
