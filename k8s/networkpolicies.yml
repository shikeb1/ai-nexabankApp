# =============================================================
# NEXABANK NETWORK POLICIES — Zero-Trust, Deny-All + Allow-Explicit
# =============================================================

# ---------- DEFAULT DENY ALL (Ingress + Egress) ----------
# Applied to every pod in the nexabank namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: nexabank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ---------- POSTGRES: Allow ingress from backend only ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 5432

---
# ---------- POSTGRES: Allow egress (DNS only) ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-egress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53   # DNS

---
# ---------- OLLAMA: Allow ingress from backend only ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-ingress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 11434

---
# ---------- OLLAMA: Allow egress (DNS + internet for model pulls) ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-egress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53   # DNS
    - ports:
        - protocol: TCP
          port: 443  # HTTPS (Ollama model registry)

---
# ---------- BACKEND: Allow ingress from frontend only ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 5000

---
# ---------- BACKEND: Allow egress to postgres, ollama, and DNS ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - protocol: TCP
          port: 11434
    - ports:
        - protocol: UDP
          port: 53   # DNS

---
# ---------- FRONTEND: Allow ingress from anywhere (public-facing) ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080

---
# ---------- FRONTEND: Allow egress to backend and DNS only ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress
  namespace: nexabank
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 5000
    - ports:
        - protocol: UDP
          port: 53   # DNS
