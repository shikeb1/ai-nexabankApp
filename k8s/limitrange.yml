apiVersion: v1
kind: LimitRange
metadata:
  name: nexabank-limitrange
  namespace: nexabank
  labels:
    app: nexabank
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2000m"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "4000m"
        memory: "6Gi"
