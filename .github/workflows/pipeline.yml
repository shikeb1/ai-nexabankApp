name: NexaBank Pure DevOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==============================================================
  # STAGE 1: CI (Continuous Integration) - Lint & Verify
  # ==============================================================
  ci-check:
    name: "Check Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lint Backend
        run: |
          pip install flake8
          flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==============================================================
  # STAGE 2: Build & Package (Containerize)
  # ==============================================================
  build-containers:
    name: "Build: ${{ matrix.component }}"
    needs: ci-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, ollama]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Container Locally
        run: docker build -t nexabank-${{ matrix.component }}:latest ./${{ matrix.component }}

  # ==============================================================
  # STAGE 3: CD (Continuous Delivery) - Push to Registry
  # ==============================================================
  ship-to-hub:
    name: "Ship to Docker Hub"
    needs: build-containers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Production Images
        run: |
          # Optimized push for all services
          for svc in backend frontend ollama; do
            docker build -t ${{ secrets.DOCKER_USERNAME }}/nexabank-$svc:latest ./$svc
            docker push ${{ secrets.DOCKER_USERNAME }}/nexabank-$svc:latest
          done
