name: "Build - Docker Build & Scan"

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

jobs:
  build:
    name: "Build & Scan - ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, ollama]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/nexabank-${{ matrix.service }}:${{ inputs.image_tag }} \
            ./${{ matrix.service }}

      - name: Scan Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/nexabank-${{ matrix.service }}:${{ inputs.image_tag }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL"

      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nexabank-${{ matrix.service }}:${{ inputs.image_tag }}
