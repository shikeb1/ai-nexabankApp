name: CI - Security Scanning

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:

  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================
  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GATE 2: LINT - Flake8 (Python) + ESLint (Frontend)
  # ============================================================
  lint:
    name: Lint - Flake8 & ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run Flake8
        run: |
          pip install flake8
          flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run ESLint
        working-directory: ./frontend
        run: |
          npm ci
          npx eslint . --ext .js,.jsx,.ts,.tsx || true

  # ============================================================
  # GATE 3: SAST - Bandit (Python Static Security Testing)
  # Runs after Gates 1 & 2 pass
  # ============================================================
  sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run Bandit SAST
        run: |
          pip install bandit
          bandit -r ./backend \
            --severity-level medium \
            --confidence-level medium \
            -f txt -o bandit-report.txt || true
          cat bandit-report.txt

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.txt

  # ============================================================
  # GATE 4: SCA - Dependency Vulnerability Audit
  # Runs in parallel with Gate 3 after Gates 1 & 2
  # ============================================================
  sca:
    name: SCA - Safety & npm audit
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run Safety (Python CVE Audit)
        run: |
          pip install safety
          pip install -r ./backend/requirements.txt
          safety check -r ./backend/requirements.txt --output text || true

      - name: Run npm audit (Frontend CVE Audit)
        working-directory: ./frontend
        run: |
          npm ci
          npm audit --audit-level=high || true
